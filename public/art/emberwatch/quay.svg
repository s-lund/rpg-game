<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" preserveAspectRatio="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.016" numOctaves="3" seed="21" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.34  0 0 0 0 0.27  0 0 0 0 0.18  0 0 0 0.10 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5"/>
    </filter>
    <radialGradient id="vignette" cx="55%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#e2cfa4"/>
      <stop offset="55%" stop-color="#d2bb8c"/>
      <stop offset="85%" stop-color="#b0926090"/>
      <stop offset="100%" stop-color="#82663e"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#76928a"/>
      <stop offset="100%" stop-color="#5f7d78"/>
    </linearGradient>
    <g id="bldg">
      <rect x="-22" y="-14" width="44" height="28" fill="#cdb98e" stroke="#5a4632" stroke-width="2.2"/>
      <line x1="-22" y1="-14" x2="22" y2="14" stroke="#5a4632" stroke-width="0.7" opacity="0.4"/>
    </g>
  </defs>

  <rect width="1000" height="750" fill="url(#vignette)"/>
  <rect width="1000" height="750" fill="transparent" filter="url(#grain)"/>

  <!-- harbor water: west and south -->
  <path filter="url(#rough)" d="M0,0 L120,0 C160,120 130,260 170,360 C210,470 120,540 200,620 C290,700 420,660 560,690 C700,720 850,690 1000,720 L1000,750 L0,750 Z"
        fill="url(#sea)" stroke="#4e6860" stroke-width="3"/>
  <g stroke="#7e9a90" stroke-width="1.4" fill="none" opacity="0.8">
    <path d="M70,180 q14,-7 28,0 q14,7 28,0"/>
    <path d="M60,420 q14,-7 28,0 q14,7 28,0"/>
    <path d="M150,560 q14,-7 28,0"/>
    <path d="M340,690 q14,-7 28,0 q14,7 28,0"/>
    <path d="M640,710 q14,-7 28,0"/>
    <path d="M90,640 q14,-7 28,0"/>
  </g>

  <!-- sunken hulks in the harbor -->
  <g stroke="#3e4e48" fill="#bfae87">
    <g transform="translate(120,500) rotate(-18)">
      <path d="M-20,5 Q0,14 20,5 L15,0 L-15,0 Z" stroke-width="1.6"/>
      <line x1="2" y1="0" x2="6" y2="-22" stroke-width="2"/>
    </g>
    <g transform="translate(420,705) rotate(8)">
      <path d="M-16,4 Q0,11 16,4 L12,0 L-12,0 Z" stroke-width="1.4"/>
    </g>
  </g>

  <!-- piers reaching into the water near Pier Row (460,510) -->
  <g stroke="#6d543a" stroke-width="5" opacity="0.9">
    <line x1="430" y1="540" x2="330" y2="640"/>
    <line x1="480" y1="560" x2="430" y2="670"/>
    <line x1="520" y1="555" x2="560" y2="665"/>
  </g>
  <g stroke="#6d543a" stroke-width="1.6">
    <path d="M412,558 l18,14 M392,578 l18,14 M372,598 l18,14 M352,618 l18,14"/>
    <path d="M468,585 l16,8 M455,612 l16,8 M442,639 l16,8"/>
    <path d="M528,580 l-15,9 M540,607 l-15,9 M552,634 l-15,9"/>
  </g>

  <!-- streets connecting areas -->
  <g fill="none" stroke="#6d543a" stroke-width="4" stroke-dasharray="9 7" stroke-linecap="round" opacity="0.85">
    <path d="M720,585 C740,515 760,445 780,375"/>   <!-- gate → fishrow -->
    <path d="M720,585 C635,560 545,535 460,510"/>   <!-- gate → pier row -->
    <path d="M780,375 C715,330 645,285 580,240"/>   <!-- fishrow → warehouse -->
    <path d="M460,510 C390,480 320,450 260,420"/>   <!-- pier row → chapel -->
    <path d="M580,240 C485,215 395,190 300,165"/>   <!-- warehouse → hall -->
    <path d="M260,420 C270,335 285,250 300,165"/>   <!-- chapel → hall -->
  </g>

  <!-- district buildings (ink blocks) -->
  <g>
    <!-- Quay Gate (720,585) -->
    <g transform="translate(720,585)">
      <use href="#bldg" transform="rotate(-8) scale(1.0)"/>
      <path d="M-8,14 L-8,2 L0,-4 L8,2 L8,14" fill="#dbc89e" stroke="#5a4632" stroke-width="2"/>
      <line x1="-30" y1="22" x2="30" y2="22" stroke="#5a4632" stroke-width="2.6"/>
    </g>
    <!-- Fishrow Market (780,375): stalls + nets -->
    <g transform="translate(780,375)">
      <use href="#bldg" transform="rotate(4) scale(0.9)"/>
      <path d="M-34,20 L-14,20 L-16,12 L-32,12 Z" fill="#b08a5a" stroke="#5a4632" stroke-width="1.6"/>
      <path d="M16,22 L36,22 L34,14 L18,14 Z" fill="#b08a5a" stroke="#5a4632" stroke-width="1.6"/>
      <path d="M-10,-22 q10,-8 20,0" fill="none" stroke="#5a4632" stroke-width="1.2"/>
    </g>
    <!-- Pier Row (460,510) -->
    <g transform="translate(460,510)">
      <use href="#bldg" transform="rotate(12) scale(0.85)"/>
      <use href="#bldg" transform="translate(40,-18) rotate(-6) scale(0.6)"/>
    </g>
    <!-- Salt Warehouse (580,240): long shed -->
    <g transform="translate(580,240)">
      <rect x="-38" y="-16" width="76" height="32" fill="#cdb98e" stroke="#5a4632" stroke-width="2.4"/>
      <line x1="-38" y1="0" x2="38" y2="0" stroke="#5a4632" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="-16" x2="0" y2="16" stroke="#5a4632" stroke-width="1" opacity="0.5"/>
    </g>
    <!-- Sunken Chapel (260,420): half-flooded -->
    <g transform="translate(260,420)">
      <path d="M-16,12 L-16,-6 L0,-18 L16,-6 L16,12 Z" fill="#cdb98e" stroke="#5a4632" stroke-width="2.2"/>
      <circle cx="0" cy="-4" r="4" fill="#dbc89e" stroke="#5a4632" stroke-width="1.4"/>
      <path d="M-22,12 q11,-6 22,0 q11,6 22,0" fill="none" stroke="#5f7d78" stroke-width="2.4"/>
    </g>
    <!-- Harbormaster's Hall (300,165): grand hall -->
    <g transform="translate(300,165)">
      <rect x="-30" y="-20" width="60" height="40" fill="#cdb98e" stroke="#5a4632" stroke-width="2.6"/>
      <path d="M-30,-20 L0,-34 L30,-20" fill="#b08a5a" stroke="#5a4632" stroke-width="2"/>
      <rect x="-6" y="4" width="12" height="16" fill="#3e3026"/>
      <line x1="-18" y1="-6" x2="-10" y2="-6" stroke="#5a4632" stroke-width="2"/>
      <line x1="10" y1="-6" x2="18" y2="-6" stroke="#5a4632" stroke-width="2"/>
    </g>
  </g>

  <!-- title -->
  <g transform="translate(500,46)">
    <path d="M-170,-22 L170,-22 L186,0 L170,22 L-170,22 L-186,0 Z" fill="#e3d2a6" stroke="#7a6244" stroke-width="2.2"/>
    <text text-anchor="middle" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="5" fill="#4e3a26">THE DROWNED QUAY</text>
    <text text-anchor="middle" y="16" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="10" letter-spacing="2" fill="#7a6244">harbor district of the western shore</text>
  </g>

  <rect x="8" y="8" width="984" height="734" fill="none" stroke="#4e3a26" stroke-width="6"/>
  <rect x="18" y="18" width="964" height="714" fill="none" stroke="#7a6244" stroke-width="1.6"/>
</svg>
