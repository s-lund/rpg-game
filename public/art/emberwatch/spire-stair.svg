<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" preserveAspectRatio="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.016" numOctaves="3" seed="32" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.28  0 0 0 0 0.24  0 0 0 0 0.20  0 0 0 0.11 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="46%" r="75%">
      <stop offset="0%" stop-color="#d8c9ad"/>
      <stop offset="55%" stop-color="#c4b18c"/>
      <stop offset="85%" stop-color="#9d8459"/>
      <stop offset="100%" stop-color="#6e5938"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="750" fill="url(#vignette)"/>
  <rect width="1000" height="750" fill="transparent" filter="url(#grain)"/>

  <!-- tower shaft narrows on the climb -->
  <circle cx="500" cy="400" r="260" fill="#d2c098" stroke="#4e3a26" stroke-width="14"/>
  <circle cx="500" cy="400" r="244" fill="none" stroke="#7a6244" stroke-width="2"/>

  <!-- open shaft core (drop to the hall below) -->
  <circle cx="500" cy="400" r="92" fill="#6e5938" stroke="#4e3a26" stroke-width="6"/>
  <circle cx="500" cy="400" r="92" fill="none" stroke="#3c2e1c" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="500" y="405" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#d8c9ad">open shaft</text>

  <!-- winding stair: annular ring with radial treads -->
  <g stroke="#5a4632" stroke-width="2">
    <circle cx="500" cy="400" r="170" fill="#c2ae82" stroke-width="4"/>
    <circle cx="500" cy="400" r="170" fill="none" stroke="#7a6244" stroke-width="1.4"/>
  </g>
  <g stroke="#5a4632" stroke-width="1.8" opacity="0.85">
    <line x1="500" y1="308" x2="500" y2="230"/>
    <line x1="565" y1="325" x2="620" y2="270"/>
    <line x1="592" y1="400" x2="670" y2="400"/>
    <line x1="565" y1="475" x2="620" y2="530"/>
    <line x1="500" y1="492" x2="500" y2="570"/>
    <line x1="435" y1="475" x2="380" y2="530"/>
    <line x1="408" y1="400" x2="330" y2="400"/>
    <line x1="435" y1="325" x2="380" y2="270"/>
  </g>

  <!-- the broken flight: collapsed section, SW (Broken Stair site at 380,510) -->
  <path d="M392,470 L330,560 L420,585 L455,495 Z" fill="#6e5938" stroke="#3c2e1c" stroke-width="3"/>
  <g stroke="#3c2e1c" stroke-width="1.6" opacity="0.8">
    <line x1="352" y1="540" x2="402" y2="554"/>
    <line x1="368" y1="512" x2="430" y2="528"/>
  </g>
  <g fill="#a68c62" stroke="#5a4632" stroke-width="1.2">
    <circle cx="300" cy="595" r="5"/>
    <circle cx="318" cy="608" r="3.5"/>
    <circle cx="282" cy="612" r="3"/>
  </g>

  <!-- plank bridging the gap -->
  <line x1="345" y1="552" x2="448" y2="505" stroke="#6d543a" stroke-width="6"/>
  <line x1="345" y1="552" x2="448" y2="505" stroke="#3c2e1c" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- bell gallery niche, NE (Bell Gallery site at 600,255) -->
  <g transform="translate(600,255)">
    <path d="M-44,30 A52,52 0 0 1 44,30 L30,30 A38,38 0 0 0 -30,30 Z" fill="#c2ae82" stroke="#4e3a26" stroke-width="3"/>
    <path d="M-12,-10 a12,12 0 0 1 24,0 l0,14 l-24,0 Z" fill="#8a7350" stroke="#4e3a26" stroke-width="2.4"/>
    <circle cx="0" cy="8" r="2.6" fill="#4e3a26"/>
    <path d="M-30,-26 a30,30 0 0 1 60,0" fill="none" stroke="#5a4632" stroke-width="2" stroke-dasharray="6 5"/>
  </g>

  <!-- stairs down (S) and up (N) markers -->
  <g transform="translate(500,610)" stroke="#4e3a26" fill="none">
    <path d="M-22,12 L22,12 L22,-12 L-22,-12 Z" fill="#bfa97e" stroke-width="2.6"/>
    <line x1="-12" y1="12" x2="-12" y2="-12" stroke-width="1.8"/>
    <line x1="-2" y1="12" x2="-2" y2="-12" stroke-width="1.8"/>
    <line x1="8" y1="12" x2="8" y2="-12" stroke-width="1.8"/>
    <path d="M0,20 L0,30 M-5,26 L0,30 L5,26" stroke-width="2.2"/>
  </g>
  <text x="540" y="622" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#5a4632">down</text>
  <g transform="translate(500,190)" stroke="#4e3a26" fill="none">
    <path d="M-22,12 L22,12 L22,-12 L-22,-12 Z" fill="#bfa97e" stroke-width="2.6"/>
    <line x1="-12" y1="12" x2="-12" y2="-12" stroke-width="1.8"/>
    <line x1="-2" y1="12" x2="-2" y2="-12" stroke-width="1.8"/>
    <line x1="8" y1="12" x2="8" y2="-12" stroke-width="1.8"/>
    <path d="M0,-20 L0,-30 M-5,-26 L0,-30 L5,-26" stroke-width="2.2"/>
  </g>
  <text x="540" y="186" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#5a4632">up</text>

  <!-- title -->
  <g transform="translate(500,46)">
    <path d="M-180,-22 L180,-22 L196,0 L180,22 L-180,22 L-196,0 Z" fill="#e3d2a6" stroke="#7a6244" stroke-width="2.2"/>
    <text text-anchor="middle" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="5" fill="#4e3a26">THE BELL SPIRE</text>
    <text text-anchor="middle" y="16" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="10" letter-spacing="2" fill="#7a6244">the Long Stair — broken flights and the bell gallery</text>
  </g>

  <rect x="8" y="8" width="984" height="734" fill="none" stroke="#4e3a26" stroke-width="6"/>
  <rect x="18" y="18" width="964" height="714" fill="none" stroke="#7a6244" stroke-width="1.6"/>
</svg>
