<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" preserveAspectRatio="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.017" numOctaves="3" seed="42" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.16  0 0 0 0 0.11  0 0 0 0 0.08  0 0 0 0.15 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="stone" cx="50%" cy="46%" r="78%">
      <stop offset="0%" stop-color="#6e5c44"/>
      <stop offset="55%" stop-color="#52432f"/>
      <stop offset="85%" stop-color="#362b1e"/>
      <stop offset="100%" stop-color="#1c1610"/>
    </radialGradient>
    <radialGradient id="emberglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a050" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#c96a2a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c96a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heart" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd28a"/>
      <stop offset="35%" stop-color="#e08a3c"/>
      <stop offset="75%" stop-color="#8a3c1e"/>
      <stop offset="100%" stop-color="#3c1812"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="750" fill="url(#stone)"/>
  <rect width="1000" height="750" fill="transparent" filter="url(#grain)"/>

  <!-- corridor between the two chambers -->
  <g stroke="#15100a" stroke-width="50" stroke-linecap="round" fill="none">
    <path d="M360,450 C430,370 510,290 580,210"/>
  </g>
  <g stroke="#64543c" stroke-width="40" stroke-linecap="round" fill="none">
    <path d="M360,450 C430,370 510,290 580,210"/>
  </g>
  <g stroke="#2a2014" stroke-width="2" stroke-dasharray="8 6" fill="none" opacity="0.85">
    <path d="M360,450 C430,370 510,290 580,210"/>
  </g>

  <!-- Forgotten Reliquary (360,450): cross-shaped chamber -->
  <g transform="translate(360,450)">
    <path d="M-40,-110 L40,-110 L40,-40 L110,-40 L110,40 L40,40 L40,110 L-40,110 L-40,40 L-110,40 L-110,-40 L-40,-40 Z"
          fill="#64543c" stroke="#15100a" stroke-width="9"/>
    <path d="M-30,-98 L30,-98 L30,-30 L98,-30 L98,30 L30,30 L30,98 L-30,98 L-30,30 L-98,30 L-98,-30 L-30,-30 Z"
          fill="none" stroke="#3c2e1c" stroke-width="2"/>
    <!-- pried-open reliquary chests -->
    <g fill="#2a2014" stroke="#15100a" stroke-width="2">
      <rect x="-86" y="-16" width="26" height="32"/>
      <rect x="60" y="-16" width="26" height="32"/>
      <rect x="-13" y="-92" width="26" height="28"/>
    </g>
    <g stroke="#9a8a5a" stroke-width="2" fill="none">
      <path d="M-86,-16 L-60,-26"/>
      <path d="M86,-16 L60,-26"/>
    </g>
    <!-- empty plinth at the cross heart -->
    <circle r="16" fill="#2a2014" stroke="#15100a" stroke-width="3"/>
    <circle r="16" fill="none" stroke="#9a8a5a" stroke-width="1.2" stroke-dasharray="4 4"/>
  </g>

  <!-- The Ember Heart (580,210): great round vault, banked fire core -->
  <g transform="translate(580,210)">
    <circle r="130" fill="#64543c" stroke="#15100a" stroke-width="10"/>
    <circle r="116" fill="none" stroke="#3c2e1c" stroke-width="2"/>
    <!-- ring of scorched pillars -->
    <g fill="#3c2e1c" stroke="#15100a" stroke-width="2.4">
      <circle cx="0" cy="-88" r="9"/>
      <circle cx="62" cy="-62" r="9"/>
      <circle cx="88" cy="0" r="9"/>
      <circle cx="62" cy="62" r="9"/>
      <circle cx="0" cy="88" r="9"/>
      <circle cx="-62" cy="62" r="9"/>
      <circle cx="-88" cy="0" r="9"/>
      <circle cx="-62" cy="-62" r="9"/>
    </g>
    <!-- the heart itself -->
    <circle r="64" fill="url(#emberglow)"/>
    <circle r="40" fill="url(#heart)" stroke="#15100a" stroke-width="3"/>
    <g stroke="#ffd28a" stroke-width="1.6" opacity="0.9" fill="none">
      <path d="M-20,-4 q6,-8 12,0 q6,8 12,0"/>
      <path d="M-12,14 q6,-7 12,0"/>
    </g>
    <!-- cracks radiating -->
    <g stroke="#15100a" stroke-width="2" fill="none" opacity="0.8">
      <path d="M40,12 L74,30 L96,26"/>
      <path d="M-38,-18 L-70,-34"/>
      <path d="M10,40 L18,72"/>
    </g>
  </g>

  <!-- chasm along the south-east -->
  <path d="M700,520 C760,540 830,600 870,690 L760,710 C720,640 690,580 660,560 Z"
        fill="#0e0a06" stroke="#15100a" stroke-width="4"/>
  <g stroke="#2a2014" stroke-width="1.6" fill="none" opacity="0.9">
    <path d="M700,545 C745,565 800,615 835,680"/>
    <path d="M685,560 C720,585 760,630 785,690"/>
  </g>

  <!-- stair up, west of reliquary -->
  <g transform="translate(225,395)" stroke="#15100a" fill="none">
    <path d="M-22,12 L22,12 L22,-12 L-22,-12 Z" fill="#52432f" stroke-width="3"/>
    <line x1="-12" y1="12" x2="-12" y2="-12" stroke-width="2"/>
    <line x1="-2" y1="12" x2="-2" y2="-12" stroke-width="2"/>
    <line x1="8" y1="12" x2="8" y2="-12" stroke-width="2"/>
    <path d="M0,-20 L0,-30 M-5,-26 L0,-30 L5,-26" stroke="#cfc0a0" stroke-width="2.2"/>
  </g>
  <text x="190" y="350" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#cfc0a0">up</text>

  <!-- title -->
  <g transform="translate(500,46)">
    <path d="M-185,-22 L185,-22 L201,0 L185,22 L-185,22 L-201,0 Z" fill="#1c150e" stroke="#9a8a5a" stroke-width="2.2"/>
    <text text-anchor="middle" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="5" fill="#d8c9a4">THE EMBER VAULTS</text>
    <text text-anchor="middle" y="16" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="10" letter-spacing="2" fill="#9a8a5a">the Deep Vault — reliquaries and the banked heart</text>
  </g>

  <rect x="8" y="8" width="984" height="734" fill="none" stroke="#0e0a06" stroke-width="6"/>
  <rect x="18" y="18" width="964" height="714" fill="none" stroke="#52432f" stroke-width="1.6"/>
</svg>
