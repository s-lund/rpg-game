<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" preserveAspectRatio="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.015" numOctaves="3" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.36  0 0 0 0 0.28  0 0 0 0 0.18  0 0 0 0.10 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="44%" r="75%">
      <stop offset="0%" stop-color="#e8d6ac"/>
      <stop offset="55%" stop-color="#d9c294"/>
      <stop offset="85%" stop-color="#b89b6a"/>
      <stop offset="100%" stop-color="#8a6e44"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#7e9890"/>
      <stop offset="100%" stop-color="#9db1a0"/>
    </linearGradient>
    <g id="tree">
      <path d="M0,0 C-7,-2 -9,-12 0,-16 C9,-12 7,-2 0,0 Z" fill="#7d8a5c" stroke="#4f5c38" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#4f5c38" stroke-width="1.5"/>
    </g>
    <g id="peak">
      <path d="M-16,12 L0,-14 L16,12 Z" fill="#c5ad82" stroke="#6b563a" stroke-width="1.6"/>
      <path d="M0,-14 L6,0 L1,0 Z" fill="#efe4c8" stroke="none"/>
      <path d="M-9,12 L0,-14" fill="none" stroke="#6b563a" stroke-width="0.7" opacity="0.6"/>
    </g>
  </defs>

  <!-- parchment -->
  <rect width="1000" height="750" fill="url(#vignette)"/>
  <rect width="1000" height="750" fill="transparent" filter="url(#grain)"/>

  <!-- sea (west) -->
  <path filter="url(#rough)" d="M0,0 L150,0 C120,90 130,180 118,260 C108,330 150,360 175,395 C205,440 175,520 195,600 C210,665 185,710 175,750 L0,750 Z"
        fill="url(#sea)" stroke="#5f7a72" stroke-width="3"/>
  <!-- coast hatching -->
  <path d="M150,0 C120,90 130,180 118,260 C108,330 150,360 175,395 C205,440 175,520 195,600 C210,665 185,710 175,750"
        fill="none" stroke="#4e6058" stroke-width="1.2" opacity="0.7"/>
  <g stroke="#6e8a80" stroke-width="1.4" fill="none" opacity="0.8">
    <path d="M40,120 q14,-7 28,0 q14,7 28,0"/>
    <path d="M30,300 q14,-7 28,0 q14,7 28,0"/>
    <path d="M55,480 q14,-7 28,0 q14,7 28,0"/>
    <path d="M40,640 q14,-7 28,0 q14,7 28,0"/>
    <path d="M85,210 q12,-6 24,0"/>
    <path d="M95,560 q12,-6 24,0"/>
  </g>
  <!-- little ship -->
  <g transform="translate(78,395)" stroke="#3e4e48" fill="#cdb98e">
    <path d="M-14,4 Q0,12 14,4 L10,0 L-10,0 Z" stroke-width="1.4"/>
    <line x1="0" y1="0" x2="0" y2="-16" stroke-width="1.6"/>
    <path d="M0,-16 L11,-5 L0,-5 Z" fill="#e3d4ae" stroke-width="1.2"/>
  </g>

  <!-- harbor bay by the Drowned Quay (180,345) -->
  <path filter="url(#rough)" d="M118,260 C160,290 205,305 218,345 C205,385 160,380 175,395 C150,360 108,330 118,260 Z"
        fill="url(#sea)" stroke="#5f7a72" stroke-width="2"/>

  <!-- river: from northern heights, under Watcher's Bridge (440,375), into the bay -->
  <path filter="url(#rough)" d="M470,0 C465,70 450,140 458,210 C466,280 452,330 440,375 C420,440 330,430 280,410 C240,395 225,370 218,345"
        fill="none" stroke="#7e9890" stroke-width="14" opacity="0.9"/>
  <path d="M470,0 C465,70 450,140 458,210 C466,280 452,330 440,375 C420,440 330,430 280,410 C240,395 225,370 218,345"
        fill="none" stroke="#56716a" stroke-width="2"/>

  <!-- mountains NE -->
  <g>
    <use href="#peak" transform="translate(845,95)"/>
    <use href="#peak" transform="translate(900,120) scale(1.2)"/>
    <use href="#peak" transform="translate(815,150) scale(0.9)"/>
    <use href="#peak" transform="translate(925,70) scale(0.8)"/>
    <use href="#peak" transform="translate(870,180) scale(1.05)"/>
    <use href="#peak" transform="translate(940,210) scale(0.85)"/>
  </g>

  <!-- forest south + scattered -->
  <g>
    <use href="#tree" transform="translate(330,690)"/>
    <use href="#tree" transform="translate(360,672) scale(1.15)"/>
    <use href="#tree" transform="translate(395,700)"/>
    <use href="#tree" transform="translate(430,680) scale(0.9)"/>
    <use href="#tree" transform="translate(465,702) scale(1.1)"/>
    <use href="#tree" transform="translate(285,672) scale(0.85)"/>
    <use href="#tree" transform="translate(620,690) scale(1.1)"/>
    <use href="#tree" transform="translate(655,670)"/>
    <use href="#tree" transform="translate(690,695) scale(0.9)"/>
    <use href="#tree" transform="translate(730,675) scale(1.15)"/>
    <use href="#tree" transform="translate(775,700)"/>
    <use href="#tree" transform="translate(905,420) scale(0.9)"/>
    <use href="#tree" transform="translate(935,455)"/>
    <use href="#tree" transform="translate(880,470) scale(0.8)"/>
  </g>

  <!-- old city wall ring around the inner districts (broken) -->
  <path filter="url(#rough)" d="M300,180 C420,90 700,80 830,200 C900,280 880,430 790,500 C700,565 480,580 380,520"
        fill="none" stroke="#7a6244" stroke-width="6" stroke-dasharray="26 14" opacity="0.75"/>

  <!-- roads (travel edges), dashed ink -->
  <g fill="none" stroke="#6d543a" stroke-width="3.5" stroke-dasharray="10 8" stroke-linecap="round" opacity="0.85">
    <path d="M200,585 C245,545 290,515 340,480"/>            <!-- gate → ashen road -->
    <path d="M340,480 C400,505 455,525 520,540"/>            <!-- ashen road → pilgrim's rest -->
    <path d="M340,480 C280,440 225,395 180,345"/>            <!-- ashen road → drowned quay -->
    <path d="M340,480 C375,440 405,410 440,375"/>            <!-- ashen road → watcher's bridge -->
    <path d="M180,345 C265,330 360,350 440,375"/>            <!-- quay → bridge (coast road) -->
    <path d="M440,375 C465,320 490,275 520,225"/>            <!-- bridge → bell spire -->
    <path d="M440,375 C500,395 560,405 620,420"/>            <!-- bridge → cinder market -->
    <path d="M520,540 C555,500 585,460 620,420"/>            <!-- pilgrim's rest → market -->
    <path d="M620,420 C670,375 715,330 760,285"/>            <!-- market → ember vaults -->
    <path d="M520,225 C580,190 640,160 700,135"/>            <!-- spire → chapel -->
    <path d="M760,285 C740,230 720,180 700,135"/>            <!-- vaults → chapel -->
  </g>

  <!-- site glyphs (ink), centered on data coordinates -->
  <g stroke="#5a4632" stroke-width="2" fill="#cdb98e" stroke-linejoin="round">
    <!-- Emberwatch Gate (200,585): palisade gate with banner -->
    <g transform="translate(200,585)">
      <path d="M-18,10 L-18,-8 L-10,-8 L-10,-2 L10,-2 L10,-8 L18,-8 L18,10 Z"/>
      <path d="M-10,-2 L-10,-14 L0,-20 L10,-14 L10,-2" fill="#dbc89e"/>
      <line x1="0" y1="-20" x2="0" y2="-30"/>
      <path d="M0,-30 L10,-26 L0,-22 Z" fill="#a4502e" stroke-width="1.4"/>
    </g>
    <!-- Ashen Road (340,480): broken milestone -->
    <g transform="translate(340,480)">
      <path d="M-5,10 L-5,-8 L0,-12 L5,-8 L5,10 Z"/>
      <path d="M-14,10 L14,10" stroke-width="2.4" fill="none"/>
      <path d="M8,2 L14,-2" stroke-width="1.4" fill="none"/>
    </g>
    <!-- Pilgrim's Rest (520,540): waystation with smoke -->
    <g transform="translate(520,540)">
      <path d="M-12,10 L-12,-4 L0,-12 L12,-4 L12,10 Z"/>
      <rect x="-3" y="0" width="6" height="10" fill="#8a6e48"/>
      <path d="M7,-9 q4,-5 0,-9 q-3,-4 1,-8" fill="none" stroke-width="1.3" opacity="0.8"/>
    </g>
    <!-- Drowned Quay (180,345): sunken masts in the bay -->
    <g transform="translate(180,345)">
      <line x1="-10" y1="8" x2="-4" y2="-16" stroke-width="2.4"/>
      <line x1="-8" y1="-9" x2="2" y2="-6" stroke-width="1.6"/>
      <line x1="8" y1="9" x2="12" y2="-10" stroke-width="2"/>
      <path d="M-18,10 q9,-5 18,0 q9,5 18,0" fill="none" stroke-width="1.8"/>
    </g>
    <!-- Watcher's Bridge (440,375): arched bridge -->
    <g transform="translate(440,375)">
      <path d="M-18,2 L-18,-6 L-12,-6 L-12,-1 L12,-1 L12,-6 L18,-6 L18,2 Z"/>
      <path d="M-12,2 Q0,12 12,2" fill="none" stroke-width="2"/>
      <rect x="-20" y="-14" width="7" height="9"/>
      <rect x="13" y="-14" width="7" height="9"/>
    </g>
    <!-- Cinder Market (620,420): burnt stalls -->
    <g transform="translate(620,420)">
      <path d="M-16,8 L-16,-2 L-6,-2 L-6,8 Z"/>
      <path d="M-18,-2 L-4,-2 L-6,-8 L-16,-8 Z" fill="#b08a5a"/>
      <path d="M4,8 L4,-1 L14,-1 L14,8 Z"/>
      <path d="M2,-1 L16,-1 L14,-7 L4,-7 Z" fill="#b08a5a"/>
      <path d="M9,-7 q3,-5 0,-9" fill="none" stroke-width="1.2" opacity="0.7"/>
    </g>
    <!-- Bell Spire (520,225): tall leaning tower with bell window -->
    <g transform="translate(520,225)">
      <path d="M-9,16 L-6,-22 L8,-22 L9,16 Z"/>
      <path d="M-6,-22 L1,-34 L8,-22 Z" fill="#a4502e"/>
      <path d="M-2,-14 a4,4 0 0 1 8,0 l0,6 l-8,0 Z" fill="#5a4632"/>
      <line x1="-12" y1="16" x2="13" y2="16" stroke-width="2.4"/>
    </g>
    <!-- Ember Vaults (760,285): cathedral with cracked floor -->
    <g transform="translate(760,285)">
      <path d="M-16,12 L-16,-6 L-8,-6 L-8,-14 L0,-22 L8,-14 L8,-6 L16,-6 L16,12 Z"/>
      <path d="M-3,12 L-3,2 L3,2 L3,12 Z" fill="#3e3026"/>
      <path d="M-1,12 L-5,22 M1,12 L6,20" fill="none" stroke-width="1.4"/>
      <circle cx="0" cy="-12" r="3" fill="#dbc89e"/>
    </g>
    <!-- Chapel of the Last Light (700,135): small chapel, rose window -->
    <g transform="translate(700,135)">
      <path d="M-11,10 L-11,-4 L0,-13 L11,-4 L11,10 Z"/>
      <circle cx="0" cy="-3" r="3.4" fill="#dbc89e"/>
      <line x1="0" y1="-13" x2="0" y2="-20"/>
      <line x1="-3" y1="-17" x2="3" y2="-17"/>
    </g>
  </g>

  <!-- compass rose -->
  <g transform="translate(900,620)" stroke="#5a4632" fill="#cdb98e">
    <circle r="30" fill="none" stroke-width="1.6"/>
    <circle r="22" fill="none" stroke-width="0.8" opacity="0.7"/>
    <path d="M0,-28 L6,0 L0,28 L-6,0 Z" stroke-width="1.4"/>
    <path d="M-28,0 L0,6 L28,0 L0,-6 Z" stroke-width="1.4" fill="#b39468"/>
    <path d="M0,-28 L6,0 L0,8 L-6,0 Z" fill="#7a4a30"/>
    <text y="-36" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#5a4632" stroke="none">N</text>
  </g>

  <!-- title cartouche -->
  <g transform="translate(500,52)">
    <path d="M-235,-26 L235,-26 L255,0 L235,26 L-235,26 L-255,0 Z" fill="#e3d2a6" stroke="#7a6244" stroke-width="2.5"/>
    <path d="M-228,-19 L228,-19 L245,0 L228,19 L-228,19 L-245,0 Z" fill="none" stroke="#9a805a" stroke-width="1"/>
    <text text-anchor="middle" y="-1" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="6" fill="#4e3a26">THE EMBERWATCH FRONTIER</text>
    <text text-anchor="middle" y="17" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="11" letter-spacing="2" fill="#7a6244">being a survey of the ruined districts and the lands yet held</text>
  </g>

  <!-- frame -->
  <rect x="8" y="8" width="984" height="734" fill="none" stroke="#4e3a26" stroke-width="6"/>
  <rect x="18" y="18" width="964" height="714" fill="none" stroke="#7a6244" stroke-width="1.6"/>
</svg>
