<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" preserveAspectRatio="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.016" numOctaves="3" seed="52" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.20  0 0 0 0 0.26  0 0 0 0 0.20  0 0 0 0.11 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="fen" cx="50%" cy="46%" r="78%">
      <stop offset="0%" stop-color="#a9bb92"/>
      <stop offset="55%" stop-color="#90a67e"/>
      <stop offset="85%" stop-color="#6d8a6a"/>
      <stop offset="100%" stop-color="#46604e"/>
    </radialGradient>
    <linearGradient id="mirror" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#86aca2"/>
      <stop offset="100%" stop-color="#638e86"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="750" fill="url(#fen)"/>
  <rect width="1000" height="750" fill="transparent" filter="url(#grain)"/>

  <!-- flood water fills the granary's lower hall -->
  <path d="M120,750 C150,560 240,480 360,440 C480,400 560,420 640,380 C700,350 720,280 760,230 L1000,230 L1000,750 Z"
        fill="url(#mirror)" opacity="0.55" stroke="#4e7068" stroke-width="2"/>

  <!-- great granary outline (cut-away plan) -->
  <path d="M250,680 L250,180 L500,90 L750,180 L750,680 Z" fill="#9aab84" stroke="#33422f" stroke-width="10"/>
  <path d="M265,665 L265,190 L500,105 L735,190 L735,665 Z" fill="none" stroke="#5c7050" stroke-width="2"/>
  <!-- roof beams -->
  <g stroke="#5c7050" stroke-width="2" opacity="0.7">
    <line x1="500" y1="105" x2="500" y2="665"/>
    <line x1="265" y1="330" x2="735" y2="330"/>
    <line x1="265" y1="500" x2="735" y2="500"/>
  </g>

  <!-- Granary Steps (500,570): stone stair descending into water -->
  <g transform="translate(500,570)">
    <g stroke="#33422f" fill="#b8c49c">
      <rect x="-60" y="22" width="120" height="16" stroke-width="2.4"/>
      <rect x="-48" y="6" width="96" height="16" stroke-width="2.4"/>
      <rect x="-36" y="-10" width="72" height="16" stroke-width="2.4"/>
      <rect x="-24" y="-26" width="48" height="16" stroke-width="2.4"/>
    </g>
    <path d="M-70,48 q35,-10 70,0 q35,10 70,0" fill="none" stroke="#4e7068" stroke-width="3"/>
    <!-- drag marks up the steps -->
    <path d="M-8,38 C-6,18 -2,-2 2,-22" fill="none" stroke="#46604e" stroke-width="2" stroke-dasharray="5 4"/>
  </g>

  <!-- Flooded Threshing Floor (360,330): circle under still water -->
  <g transform="translate(360,330)">
    <circle r="95" fill="url(#mirror)" stroke="#33422f" stroke-width="5"/>
    <circle r="78" fill="none" stroke="#bcd2c8" stroke-width="1.6" opacity="0.8"/>
    <circle r="50" fill="none" stroke="#bcd2c8" stroke-width="1.2" opacity="0.6"/>
    <!-- ripple rings from a single step -->
    <circle cx="24" cy="-12" r="10" fill="none" stroke="#d6e4dc" stroke-width="1.4"/>
    <circle cx="24" cy="-12" r="20" fill="none" stroke="#d6e4dc" stroke-width="1" opacity="0.7"/>
    <!-- submerged flail and sheaf -->
    <line x1="-40" y1="30" x2="-10" y2="44" stroke="#46604e" stroke-width="3" opacity="0.8"/>
    <path d="M-52,18 l8,4 l-2,8 l-8,-4 Z" fill="#6a5c3a" opacity="0.8" stroke="#46604e" stroke-width="1.2"/>
  </g>

  <!-- Grain Vault (620,195): barred vault with sacks -->
  <g transform="translate(620,195)">
    <rect x="-90" y="-60" width="180" height="120" fill="#8a9c76" stroke="#33422f" stroke-width="6"/>
    <rect x="-78" y="-48" width="156" height="96" fill="none" stroke="#5c7050" stroke-width="1.8"/>
    <!-- bars -->
    <g stroke="#33422f" stroke-width="3">
      <line x1="-90" y1="-20" x2="-78" y2="-20"/>
      <line x1="-90" y1="10" x2="-78" y2="10"/>
      <line x1="90" y1="-20" x2="78" y2="-20"/>
      <line x1="90" y1="10" x2="78" y2="10"/>
    </g>
    <!-- grain sacks -->
    <g fill="#a08a52" stroke="#5c5030" stroke-width="1.8">
      <ellipse cx="-44" cy="22" rx="14" ry="10"/>
      <ellipse cx="-18" cy="28" rx="14" ry="10"/>
      <ellipse cx="38" cy="20" rx="14" ry="10"/>
      <ellipse cx="-32" cy="8" rx="13" ry="9"/>
    </g>
    <!-- spilled grain -->
    <g fill="#c4ae72" opacity="0.9">
      <circle cx="8" cy="34" r="1.6"/>
      <circle cx="14" cy="38" r="1.4"/>
      <circle cx="2" cy="40" r="1.4"/>
      <circle cx="20" cy="32" r="1.2"/>
    </g>
    <!-- frost creeping from the wight's corner -->
    <g stroke="#d6e4ec" stroke-width="1.4" fill="none" opacity="0.85">
      <path d="M62,-40 l-10,8 m10,-8 l-2,12 m2,-12 l-14,-2"/>
      <path d="M48,-28 l-8,6 m8,-6 l-2,9"/>
    </g>
  </g>

  <!-- connecting walk between areas -->
  <g fill="none" stroke="#6a5c3a" stroke-width="3.5" stroke-dasharray="10 7" stroke-linecap="round" opacity="0.9">
    <path d="M500,570 C450,490 405,410 360,330"/>
    <path d="M360,330 C445,285 530,240 620,195"/>
  </g>

  <!-- title -->
  <g transform="translate(500,46)">
    <path d="M-185,-22 L185,-22 L201,0 L185,22 L-185,22 L-201,0 Z" fill="#d4dcb6" stroke="#5c7050" stroke-width="2.2"/>
    <text text-anchor="middle" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="5" fill="#33422f">THE SUNKEN GRANARY</text>
    <text text-anchor="middle" y="16" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="10" letter-spacing="2" fill="#5c7050">steps, threshing floor, and the cold vault</text>
  </g>

  <rect x="8" y="8" width="984" height="734" fill="none" stroke="#33422f" stroke-width="6"/>
  <rect x="18" y="18" width="964" height="714" fill="none" stroke="#5c7050" stroke-width="1.6"/>
</svg>
