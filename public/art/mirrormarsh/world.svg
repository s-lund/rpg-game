<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" preserveAspectRatio="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.015" numOctaves="3" seed="51" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.22  0 0 0 0 0.30  0 0 0 0 0.22  0 0 0 0.10 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7"/>
    </filter>
    <radialGradient id="fen" cx="50%" cy="44%" r="78%">
      <stop offset="0%" stop-color="#bcc9a2"/>
      <stop offset="55%" stop-color="#a3b58e"/>
      <stop offset="85%" stop-color="#7e9678"/>
      <stop offset="100%" stop-color="#54705c"/>
    </radialGradient>
    <linearGradient id="mirror" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#8fb5ab"/>
      <stop offset="100%" stop-color="#6e9a92"/>
    </linearGradient>
    <g id="reed">
      <line x1="0" y1="0" x2="0" y2="-14" stroke="#4f6840" stroke-width="1.6"/>
      <line x1="-4" y1="0" x2="-3" y2="-11" stroke="#4f6840" stroke-width="1.3"/>
      <line x1="4" y1="0" x2="3" y2="-12" stroke="#4f6840" stroke-width="1.3"/>
      <ellipse cx="0" cy="-15" rx="1.6" ry="4" fill="#6a5132"/>
    </g>
  </defs>

  <rect width="1000" height="750" fill="url(#fen)"/>
  <rect width="1000" height="750" fill="transparent" filter="url(#grain)"/>

  <!-- mirror-still meres -->
  <g stroke="#4e7068" stroke-width="2.5">
    <path filter="url(#rough)" d="M80,120 C220,80 360,130 420,220 C470,300 380,360 260,350 C140,340 40,250 80,120 Z" fill="url(#mirror)"/>
    <path filter="url(#rough)" d="M560,520 C680,470 850,500 900,580 C940,650 840,710 700,700 C580,690 480,580 560,520 Z" fill="url(#mirror)"/>
    <path filter="url(#rough)" d="M700,150 C800,120 920,160 930,240 C935,310 840,340 760,320 C680,300 640,190 700,150 Z" fill="url(#mirror)"/>
    <path filter="url(#rough)" d="M150,520 C230,490 320,520 330,580 C335,640 240,670 180,650 C110,625 90,550 150,520 Z" fill="url(#mirror)"/>
  </g>
  <!-- reflections -->
  <g stroke="#bcd2c8" stroke-width="1.4" opacity="0.8" fill="none">
    <path d="M180,200 q20,-8 40,0 q20,8 40,0"/>
    <path d="M680,600 q20,-8 40,0 q20,8 40,0"/>
    <path d="M780,230 q16,-7 32,0"/>
    <path d="M200,580 q16,-7 32,0"/>
  </g>

  <!-- reed banks -->
  <g>
    <use href="#reed" transform="translate(430,255)"/>
    <use href="#reed" transform="translate(448,265) scale(0.9)"/>
    <use href="#reed" transform="translate(415,272) scale(1.1)"/>
    <use href="#reed" transform="translate(540,640)"/>
    <use href="#reed" transform="translate(560,650) scale(0.85)"/>
    <use href="#reed" transform="translate(880,360) scale(1.1)"/>
    <use href="#reed" transform="translate(900,372)"/>
    <use href="#reed" transform="translate(120,420)"/>
    <use href="#reed" transform="translate(140,432) scale(0.9)"/>
    <use href="#reed" transform="translate(340,680) scale(1.1)"/>
  </g>

  <!-- herons -->
  <g stroke="#3c4e44" stroke-width="2" fill="none" opacity="0.85">
    <path d="M620,120 q8,-8 16,0 q8,8 16,0"/>
    <path d="M660,100 q7,-7 14,0 q7,7 14,0"/>
  </g>

  <!-- causeway roads (planked, dashed) -->
  <g fill="none" stroke="#6a5c3a" stroke-width="3.5" stroke-dasharray="12 8" stroke-linecap="round" opacity="0.9">
    <path d="M240,525 C310,470 380,440 450,390"/>   <!-- camp → reedgate -->
    <path d="M450,390 C520,350 590,315 660,270"/>   <!-- reedgate → granary -->
    <path d="M660,270 C715,330 760,395 800,465"/>   <!-- granary → shrine -->
  </g>

  <!-- site glyphs -->
  <g stroke="#3c4e3a" stroke-width="2" fill="#c9d2ac" stroke-linejoin="round">
    <!-- Causeway Camp (240,525) -->
    <g transform="translate(240,525)">
      <path d="M-16,8 L-6,-10 L4,8 Z"/>
      <path d="M2,8 L12,-7 L22,8 Z" fill="#b8c49c"/>
      <path d="M-6,-10 L-6,-2" stroke-width="1.4"/>
      <path d="M26,2 q4,-6 0,-10" fill="none" stroke-width="1.3"/>
    </g>
    <!-- The Reedgate (450,390): two reed pylons -->
    <g transform="translate(450,390)">
      <line x1="-10" y1="10" x2="-10" y2="-14" stroke-width="3"/>
      <line x1="10" y1="10" x2="10" y2="-14" stroke-width="3"/>
      <path d="M-10,-14 Q0,-22 10,-14" fill="none" stroke-width="2.4"/>
      <use href="#reed" transform="translate(-20,12) scale(0.8)"/>
      <use href="#reed" transform="translate(20,12) scale(0.8)"/>
    </g>
    <!-- The Sunken Granary (660,270): roof above water -->
    <g transform="translate(660,270)">
      <path d="M-20,4 L0,-16 L20,4 Z" fill="#b8c49c"/>
      <path d="M-13,-3 L13,-3" stroke-width="1.6"/>
      <path d="M-26,8 q13,-6 26,0 q13,6 26,0" fill="none" stroke="#4e7068" stroke-width="2.4"/>
    </g>
    <!-- Heron Shrine (800,465) -->
    <g transform="translate(800,465)">
      <path d="M-10,8 L-10,-4 L0,-10 L10,-4 L10,8 Z"/>
      <path d="M0,-10 L0,-20 M-4,-16 q4,-5 8,0" fill="none" stroke-width="1.6"/>
      <circle cx="0" cy="0" r="2.4" fill="#3c4e3a"/>
    </g>
  </g>

  <!-- compass -->
  <g transform="translate(95,640)" stroke="#3c4e3a" fill="#c9d2ac">
    <circle r="26" fill="none" stroke-width="1.6"/>
    <path d="M0,-24 L5,0 L0,24 L-5,0 Z" stroke-width="1.3"/>
    <path d="M-24,0 L0,5 L24,0 L0,-5 Z" stroke-width="1.3" fill="#a3b58e"/>
    <text y="-32" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#3c4e3a" stroke="none">N</text>
  </g>

  <!-- title -->
  <g transform="translate(500,52)">
    <path d="M-200,-26 L200,-26 L220,0 L200,26 L-200,26 L-220,0 Z" fill="#d4dcb6" stroke="#5c7050" stroke-width="2.5"/>
    <text text-anchor="middle" y="-1" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="6" fill="#33422f">THE MIRRORMARSH</text>
    <text text-anchor="middle" y="17" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="11" letter-spacing="2" fill="#5c7050">a survey of the drowned fens and their causeways</text>
  </g>

  <rect x="8" y="8" width="984" height="734" fill="none" stroke="#33422f" stroke-width="6"/>
  <rect x="18" y="18" width="964" height="714" fill="none" stroke="#5c7050" stroke-width="1.6"/>
</svg>
